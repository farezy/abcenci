<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Absensi Mobile</title>
<style>
  :root { --navy: #10233F; --teal: #0EA5A0; --bg: #F3F6F9; }
  body { background: var(--bg); font-family: sans-serif; margin: 0; padding: 15px; }
  .card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  button { width: 100%; padding: 14px; background: var(--teal); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
  canvas { width: 100%; height: 120px; border: 1px dashed #ccc; border-radius: 8px; display: block; touch-action: none; }
</style>
</head>
<body>

<div class="card">
  <h3 style="margin-top:0;">Form Absensi</h3>
  <form id="absenForm">
    <input type="text" id="nama" placeholder="Nama Lengkap" required>
    <input type="text" id="nik" placeholder="NIK" required>
    <select id="departemen">
      <option>Produksi</option>
      <option>IT</option>
      <option>HR</option>
    </select>
    <label style="font-size: 12px;">Paraf:</label>
    <canvas id="signPad"></canvas>
    <button type="button" onclick="clearSign()" style="background:#e74c3c;">Hapus Paraf</button>
    <button type="submit">Kirim Absensi</button>
  </form>
</div>

<script>
  // Kredensial telah dimasukkan
  const CONFIG = {
    token: '8917311443:AAF5dA4mY9spm23180xLMkMupdmU-Dw_paM',
    chatId: '1408166587'
  };

  const canvas = document.getElementById('signPad');
  const ctx = canvas.getContext('2d');
  let drawing = false;

  canvas.addEventListener('mousedown', () => drawing = true);
  canvas.addEventListener('mousemove', (e) => {
    if(!drawing) return;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
  });
  canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });

  function clearSign() { ctx.clearRect(0,0,canvas.width, canvas.height); }

  document.getElementById('absenForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const nama = document.getElementById('nama').value;
    const nik = document.getElementById('nik').value;
    
    const msg = `Kehadiran Baru: ${nama} (${nik})`;
    fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage?chat_id=${CONFIG.chatId}&text=${encodeURIComponent(msg)}`)
    .then(() => {
        alert('Data berhasil dikirim ke Telegram!');
        document.getElementById('absenForm').reset();
        clearSign();
    });
  });
</script>
</body>
</html>
